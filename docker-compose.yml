version: '3.8'

services:
  postgres_db:
    image: postgres:15.3
    platform: linux/arm64
    container_name: dwh_postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-datawarehouse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_database.sql:/docker-entrypoint-initdb.d/init_database.sql
      - ./scripts:/mnt/scripts
      - ./datasets:/mnt/datasets

  pgadmin:
    image: dpage/pgadmin4
    platform: linux/arm64
    container_name: dwh_pgadmin
    restart: always
    depends_on:
      - postgres_db
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@dwh.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
